name: Run VLESS Bypass

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *' # Скрипт будет сам запускаться каждые 6 часов
  workflow_dispatch: # Позволяет запускать скрипт вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pysocks

    - name: Run bypass script
      run: python core/VLESS_SOURCES.py # Здесь должно быть имя вашего файла Python
