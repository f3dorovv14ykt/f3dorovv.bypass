name: Update VPN Configs

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Download and merge configs
        run: |
          # 1. Создаем папки и чистим старье
          mkdir -p configs data
          rm -f configs/f3dorovv*.txt vpn_part_* temp_all.txt clean_all.txt valid_vless.txt final_vless.txt
          rm -f f3dorovv*.txt 

          touch temp_all.txt

          # 2. Читаем URL из sources.txt и скачиваем контент
          SOURCE_FILE="data/sources.txt" 
          
          if [ -f "$SOURCE_FILE" ]; then
            sed -i 's/\r//g' "$SOURCE_FILE"
            while read -r url || [ -n "$url" ]; do
              url=$(echo "$url" | xargs)
              if [[ "$url" == http* ]]; then
                echo "Загружаю из источника: $url"
                curl -sL -k -f --connect-timeout 10 "$url" >> temp_all.txt || echo "Пропуск битого URL"
              fi
            done < "$SOURCE_FILE"
          else
            echo "Файл $SOURCE_FILE не найден, ищу только на основном сайте."
          fi

          # 🔥 ДОПОЛНИТЕЛЬНО: Скачиваем конфиги прямо с вашего сайта f3dorovv14ykt.github.io
          echo "Загружаю конфиги напрямую с f3dorovv14ykt.github.io/"
          curl -sL -k -f --connect-timeout 10 "https://f3dorovv14ykt.github.io/" >> temp_all.txt || echo "Сайт временно недоступен"

          # 3. Парсинг HTML и синтаксический фильтр
          # Флаг -o вырезает только ссылки vless://, игнорируя HTML-теги <a> и кавычки
          grep -a -oE 'vless://[0-9a-fA-F-]{36}@[^"'\'' <]+' temp_all.txt | sort -u > valid_vless.txt || true

          # 4. Проверка доступности портов (TCP-пинг)
          echo "Начинаю проверку доступности серверов..."
          touch final_vless.txt

          while read -r line; do
            # Извлекаем хост и порт из vless://UUID@хост:порт...
            host_port=$(echo "$line" | sed -E 's|vless://[^@]+@([^/?#]+).*|\1|')
            
            # Разделяем на хост и порт
            host=$(echo "$host_port" | cut -d: -f1)
            port=$(echo "$host_port" | cut -s -d: -f2)
            [ -z "$port" ] && port=443 # Если порт не указан, ставим 443

            # Быстрая проверка порта (таймаут 2 секунды)
            if nc -z -w 2 "$host" "$port" 2>/dev/null; then
              echo "✅ РАБОТАЕТ: $host:$port"
              echo "$line" >> final_vless.txt
            else
              echo "❌ НЕ РАБОТАЕТ: $host:$port (удален)"
            fi
          done < valid_vless.txt

          # 5. Разделение по 200 строк в папку configs
          if [ -s final_vless.txt ]; then
            split -l 200 final_vless.txt vpn_part_
            num=1
            for f in vpn_part_*; do
              if [ -f "$f" ]; then
                mv "$f" "configs/f3dorovv.#${num}.txt"
                num=$((num + 1))
              fi
            done
          else
            echo "empty" > "configs/f3dorovv.#1.txt"
          fi

          rm -f temp_all.txt clean_all.txt valid_vless.txt final_vless.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          
          git add configs/ data/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update configs in folder $(date)"
            git push
          fi
