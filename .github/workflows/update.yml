name: Update VPN Configs

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Download and merge configs
        run: |
          mkdir -p configs data
          rm -f configs/f3dorovv*.txt vpn_part_* temp_all.txt clean_all.txt valid_vless.txt final_vless.txt

          # 1. Сбор ссылок
          SOURCE_FILE="data/sources.txt" 
          if [ -f "$SOURCE_FILE" ]; then
            sed -i 's/\r//g' "$SOURCE_FILE"
            while read -r url || [ -n "$url" ]; do
              url=$(echo "$url" | xargs)
              [[ "$url" == http* ]] && curl -sL -k --connect-timeout 10 --max-time 30 "$url" >> temp_all.txt || true
            done < "$SOURCE_FILE"
          fi

          curl -sL -k --connect-timeout 10 --max-time 30 "https://github.io" >> temp_all.txt || true

          # 2. Парсинг vless (убираем мусор)
          grep -a -oE 'vless://[0-9a-fA-F-]{36}@[^"'\'' <]+' temp_all.txt | sort -u > valid_vless.txt || true
          
          TOTAL=$(wc -l < valid_vless.txt)
          echo "📥 Найдено: $TOTAL. Начинаю проверку..."
          touch final_vless.txt

          # 3. Функция проверки с прямой записью в файл
          check_vless() {
            line="$1"
            # Извлекаем хост и порт
            target=$(echo "$line" | cut -d'@' -f2 | cut -d'/' -f1 | cut -d'?' -f1 | cut -d'#' -f1)
            host="${target%:*}"
            port="${target##*:}"
            [[ "$host" == "$port" ]] && port=443

            # Проверка порта (1.5 сек)
            if nc -z -w 1.5 "$host" "$port" 2>/dev/null; then
              # Записываем сразу в итоговый файл
              echo "$line" >> final_vless.txt
            fi
          }
          export -f check_vless

          # 4. Запуск (снижаем до 50 потоков для стабильности записи)
          if [ -s valid_vless.txt ]; then
            xargs -I {} -P 50 bash -c 'check_vless "$@"' _ "{}" < valid_vless.txt
          fi

          ALIVE=$(wc -l < final_vless.txt)
          echo "✅ Прошли проверку: $ALIVE из $TOTAL"

          # 5. Нарезка на части
          if [ -s final_vless.txt ]; then
            split -l 200 final_vless.txt vpn_part_
            num=1
            for f in vpn_part_*; do
              mv "$f" "configs/f3dorovv.#${num}.txt"
              num=$((num + 1))
            done
          else
            echo "empty" > "configs/f3dorovv.#1.txt"
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add configs/ data/
          if ! git diff --staged --quiet; then
            git commit -m "Update: $(date +'%D %T') [Alive: $(wc -l < final_vless.txt 2>/dev/null || echo 0)]"
            git push
          fi
