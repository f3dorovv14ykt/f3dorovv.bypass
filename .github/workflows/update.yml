name: Update VPN Configs

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Download and merge configs
        run: |
          mkdir -p configs data tmp_parts
          rm -rf tmp_parts/*
          rm -f configs/f3dorovv*.txt vpn_part_* temp_all.txt clean_all.txt valid_vless.txt final_vless.txt

          # 1. Сбор ссылок
          SOURCE_FILE="data/sources.txt" 
          if [ -f "$SOURCE_FILE" ]; then
            sed -i 's/\r//g' "$SOURCE_FILE"
            while read -r url || [ -n "$url" ]; do
              url=$(echo "$url" | xargs)
              [[ "$url" == http* ]] && curl -sL -k --connect-timeout 10 --max-time 20 "$url" >> temp_all.txt || true
            done < "$SOURCE_FILE"
          fi

          curl -sL -k --connect-timeout 10 --max-time 20 "https://github.io" >> temp_all.txt || true

          # 2. Парсинг vless
          grep -a -oE 'vless://[0-9a-fA-F-]{36}@[^"'\'' <]+' temp_all.txt | sort -u > valid_vless.txt || true
          
          TOTAL=$(wc -l < valid_vless.txt)
          echo "📥 Всего найдено конфигов: $TOTAL. Начинаю проверку в 100 потоков..."

          # 3. Функция проверки
          check_vless() {
            line="$1"
            
            # Извлекаем часть после @ и до первого / ? #
            target=$(echo "$line" | cut -d'@' -f2 | cut -d'/' -f1 | cut -d'?' -f1 | cut -d'#' -f1)
            
            # Разделяем хост и порт
            if [[ "$target" == *":"* ]]; then
              host="${target%:*}"
              port="${target##*:}"
            else
              host="$target"
              port=443
            fi

            # Увеличили таймаут до 1.5 сек для стабильности
            if nc -z -w 1.5 "$host" "$port" 2>/dev/null; then
              echo "$line" > "tmp_parts/res_$(echo -n "$line" | md5sum | cut -d' ' -f1).txt"
            fi
          }
          export -f check_vless

          # 4. Запуск (100 потоков — золотая середина)
          if [ -s valid_vless.txt ]; then
            xargs -I {} -P 100 bash -c 'check_vless "$@"' _ "{}" < valid_vless.txt
          fi

          # 5. Сбор результатов
          touch final_vless.txt
          [ "$(ls -A tmp_parts/)" ] && cat tmp_parts/*.txt > final_vless.txt
          rm -rf tmp_parts
          
          ALIVE=$(wc -l < final_vless.txt)
          echo "✅ Проверку прошли: $ALIVE из $TOTAL"

          # 6. Нарезка
          if [ -s final_vless.txt ]; then
            split -l 200 final_vless.txt vpn_part_
            num=1
            for f in vpn_part_*; do
              mv "$f" "configs/f3dorovv.#${num}.txt"
              num=$((num + 1))
            done
          else
            echo "empty" > "configs/f3dorovv.#1.txt"
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add configs/ data/
          if ! git diff --staged --quiet; then
            git commit -m "Update: $(date +'%D %T') [Alive: $(wc -l < final_vless.txt 2>/dev/null || echo 0)]"
            git push
          fi
