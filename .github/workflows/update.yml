name: Update VPN Configs

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Download and merge configs
        run: |
          # 1. Подготовка
          mkdir -p configs data
          rm -f configs/f3dorovv*.txt vpn_part_* temp_all.txt valid_vless.txt final_vless.txt

          # 2. Сбор ссылок из data/sources.txt
          SOURCE_FILE="data/sources.txt" 
          touch temp_all.txt
          
          if [ -f "$SOURCE_FILE" ]; then
            echo "Читаю источники из $SOURCE_FILE..."
            sed -i 's/\r//g' "$SOURCE_FILE"
            
            while read -r url || [ -n "$url" ]; do
              url=$(echo "$url" | xargs)
              if [[ "$url" == http* ]]; then
                echo "Загружаю: $url"
                curl -sL -k -f --connect-timeout 15 --max-time 60 "$url" >> temp_all.txt || echo "Ошибка загрузки $url"
              fi
            done < "$SOURCE_FILE"
          fi

          # 3. Извлечение vless
          grep -a -oE 'vless://[0-9a-fA-F-]{36}@[^"'\'' <]+' temp_all.txt | sort -u > valid_vless.txt || true
          
          TOTAL=$(wc -l < valid_vless.txt)
          echo "📥 Найдено уникальных конфигов: $TOTAL"

          # 4. Функция проверки
          check_vless() {
            line="$1"
            target=$(echo "$line" | cut -d'@' -f2 | cut -d'/' -f1 | cut -d'?' -f1 | cut -d'#' -f1)
            host="${target%:*}"
            port="${target##*:}"
            [[ "$host" == "$port" ]] && port=443

            if nc -z -w 3 "$host" "$port" 2>/dev/null; then
              echo "$line" >> final_vless.txt
            fi
          }
          export -f check_vless

          # 5. Запуск проверки (30 потоков)
          touch final_vless.txt
          if [ "$TOTAL" -gt 0 ]; then
            echo "Начинаю проверку (таймаут 3 сек)..."
            xargs -I {} -P 30 bash -c 'check_vless "$@"' _ "{}" < valid_vless.txt
          fi

          ALIVE=$(wc -l < final_vless.txt)
          echo "✅ Живых конфигов: $ALIVE"

          # 6. Сохранение с данными ПОДПИСКИ
          if [ -s final_vless.txt ]; then
            split -l 200 final_vless.txt vpn_part_
            num=1
            
            # Настройки подписки: 1024 ГБ трафика и дата до 2027 года
            USER_INFO="upload=0; download=0; total=1099511627776; expire=1815859200"
            YAKUTSK_TIME=$(TZ="Asia/Yakutsk" date +"%Y-%m-%d / %H:%M (Yakutsk)")

            for f in vpn_part_*; do
              echo "# profile-title: f3dorovv.Main" > header.txt
              echo "# subscription-userinfo: $USER_INFO" >> header.txt
              echo "# profile-update-interval: 5" >> header.txt
              echo "# Date/Time: $YAKUTSK_TIME" >> header.txt
              
              cat header.txt "$f" > "configs/f3dorovv.#${num}.txt"
              num=$((num + 1))
            done
            rm header.txt
          else
            echo "empty" > "configs/f3dorovv.#1.txt"
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add configs/ data/
          if ! git diff --staged --quiet; then
            git commit -m "Update Main: $(TZ="Asia/Yakutsk" date) [Alive: $(wc -l < final_vless.txt 2>/dev/null || echo 0)]"
            git push
          fi
