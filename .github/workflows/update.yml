name: Update VPN Configs

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Download and merge configs
        run: |
          mkdir -p configs data tmp_parts
          rm -rf tmp_parts/*
          rm -f configs/f3dorovv*.txt vpn_part_* temp_all.txt clean_all.txt valid_vless.txt final_vless.txt

          # 1. Быстрый сбор всех ссылок
          SOURCE_FILE="data/sources.txt" 
          if [ -f "$SOURCE_FILE" ]; then
            sed -i 's/\r//g' "$SOURCE_FILE"
            while read -r url || [ -n "$url" ]; do
              url=$(echo "$url" | xargs)
              [[ "$url" == http* ]] && curl -sL -k --connect-timeout 5 --max-time 10 "$url" >> temp_all.txt || true
            done < "$SOURCE_FILE"
          fi

          curl -sL -k --connect-timeout 5 --max-time 10 "https://github.io" >> temp_all.txt || true

          # 2. Очистка и фильтрация синтаксиса
          grep -a -oE 'vless://[0-9a-fA-F-]{36}@[^"'\'' <]+' temp_all.txt | sort -u > valid_vless.txt || true
          
          TOTAL=$(wc -l < valid_vless.txt)
          echo "📥 Всего найдено конфигов: $TOTAL. Начинаю проверку в 150 потоков..."

          # 3. Агрессивная проверка порта
          check_vless() {
            line="$1"
            # Извлекаем host:port
            hp=$(echo "$line" | sed -E 's|vless://[^@]+@([^/?#]+).*|\1|')
            host="${hp%:*}"
            port="${hp##*:}"
            [[ "$host" == "$port" ]] && port=443 # если порта нет в строке

            # Таймаут 0.3 сек, тихий режим
            if nc -z -w 0.3 "$host" "$port" 2>/dev/null; then
              # Пишем во временный файл (минимум операций)
              echo "$line" > "tmp_parts/$(echo -n "$line" | md5sum | cut -d' ' -f1).txt"
            fi
          }
          export -f check_vless

          # Запуск массовой проверки (xargs -P 150)
          if [ -s valid_vless.txt ]; then
            xargs -I {} -P 150 bash -c 'check_vless "{}"' < valid_vless.txt
          fi

          # 4. Сборка живых конфигов
          touch final_vless.txt
          if [ "$(ls -A tmp_parts/)" ]; then
            cat tmp_parts/*.txt > final_vless.txt
          fi
          rm -rf tmp_parts
          
          ALIVE=$(wc -l < final_vless.txt)
          echo "✅ Проверку прошли: $ALIVE из $TOTAL"

          # 5. Разбивка на файлы по 200 строк
          if [ -s final_vless.txt ]; then
            split -l 200 final_vless.txt vpn_part_
            num=1
            for f in vpn_part_*; do
              mv "$f" "configs/f3dorovv.#${num}.txt"
              num=$((num + 1))
            done
          else
            echo "empty" > "configs/f3dorovv.#1.txt"
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add configs/ data/
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update: $(date +'%D %T') [Alive: $(wc -l < final_vless.txt 2>/dev/null || echo 0)]"
            git push
          fi
