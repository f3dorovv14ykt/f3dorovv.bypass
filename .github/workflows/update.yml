name: Update VPN Configs

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Download and merge configs
        run: |
          # 1. Создаем папки и чистим старье
          mkdir -p configs data
          rm -f configs/f3dorovv*.txt vpn_part_* temp_all.txt clean_all.txt valid_vless.txt
          rm -f f3dorovv*.txt 

          touch temp_all.txt

          # 2. Читаем URL из sources.txt и скачиваем контент
          SOURCE_FILE="data/sources.txt" 
          
          if [ -f "$SOURCE_FILE" ]; then
            sed -i 's/\r//g' "$SOURCE_FILE"
            while read -r url || [ -n "$url" ]; do
              url=$(echo "$url" | xargs)
              if [[ "$url" == http* ]]; then
                echo "Загружаю из источника: $url"
                curl -sL -k -f --connect-timeout 10 "$url" >> temp_all.txt || echo "Пропуск битого URL"
              fi
            done < "$SOURCE_FILE"
          else
            echo "ОШИБКА: Файл $SOURCE_FILE не найден! Убедись, что он в папке data."
            exit 1
          fi

          # 3. Удаление дублей и фильтрация битых vless
          # Оставляем только строки, которые начинаются с vless:// и имеют валидный UUID
          grep -a . temp_all.txt | sort -u > clean_all.txt || true
          grep -E '^vless://[0-9a-fA-F-]{36}@' clean_all.txt > valid_vless.txt || true
          
          # 💡 Если ваши источники отдают Base64 (а не открытые vless:// ссылки),
          # раскомментируйте блок ниже, чтобы сначала декодировать их:
          # if base64 -d temp_all.txt &>/dev/null; then
          #    base64 -d temp_all.txt > decoded.txt
          #    grep -E '^vless://[0-9a-fA-F-]{36}@' decoded.txt >> valid_vless.txt || true
          # fi

          # 4. Разделение по 200 строк в папку configs
          if [ -s valid_vless.txt ]; then
            split -l 200 valid_vless.txt vpn_part_
            num=1
            for f in vpn_part_*; do
              if [ -f "$f" ]; then
                mv "$f" "configs/f3dorovv.#${num}.txt"
                num=$((num + 1))
              fi
            done
          else
            echo "empty" > "configs/f3dorovv.#1.txt"
          fi

          rm -f temp_all.txt clean_all.txt valid_vless.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          
          git add configs/ data/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update configs in folder $(date)"
            git push
          fi
